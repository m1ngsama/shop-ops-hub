name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          OSS_SSH_KEY: ${{ secrets.OSS_SSH_KEY }}
          OSS_HOST: ${{ secrets.OSS_HOST }}
          OSS_PORT: ${{ secrets.OSS_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$OSS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${OSS_PORT:-22}" "$OSS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on OSS
        env:
          OSS_HOST: ${{ secrets.OSS_HOST }}
          OSS_PORT: ${{ secrets.OSS_PORT }}
          OSS_USER: ${{ secrets.OSS_USER }}
        run: |
          ssh -p "${OSS_PORT:-22}" "$OSS_USER@$OSS_HOST" 'APP_DIR=/opt/shop-ops-hub BRANCH=main sh /opt/shop-ops-hub/deploy/production-deploy.sh'
